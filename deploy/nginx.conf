# ================================================================
# DHsystem Knowledge Hub — Nginx Configuration
#
# Thay YOUR_DOMAIN.com bằng domain thật hoặc IP VPS của bạn
# Sau khi có SSL (certbot), file này sẽ được tự động cập nhật
# ================================================================

# Redirect HTTP → HTTPS (certbot sẽ tự điền sau)
server {
    listen 80;
    server_name YOUR_DOMAIN.com;

    # ── MCP SSE Endpoint ────────────────────────────────────────
    # QUAN TRỌNG: SSE cần tắt buffering để stream hoạt động
    location /sse {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Bắt buộc để SSE hoạt động
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1 giờ timeout cho SSE
        proxy_send_timeout 3600s;

        # Thêm CORS headers cho xiaozhi.me
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Cache-Control' 'no-cache';
    }

    # ── MCP Messages (POST) ─────────────────────────────────────
    location /messages/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # ── WebSocket Bridge cho ESP32 ───────────────────────────────
    location /xiaozhi/ {
        proxy_pass http://localhost:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API Endpoints ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Upload file lớn (tài liệu PDF)
        client_max_body_size 100M;
        proxy_read_timeout 300s;
    }

    # ── OTA Endpoint cho ESP32 ───────────────────────────────────
    location /ota/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health Check + Root ──────────────────────────────────────
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# HTTPS config sẽ được certbot tự động thêm vào đây sau lệnh:
# certbot --nginx -d YOUR_DOMAIN.com
